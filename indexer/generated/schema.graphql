type Query {
  proposal(id: BigInt!): proposal
  proposals(where: proposalFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): proposalPage!
  chainEvent(id: String!): chainEvent
  chainEvents(where: chainEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): chainEventPage!
  election(id: String!): election
  elections(where: electionFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): electionPage!
  voteCommit(id: String!): voteCommit
  voteCommits(where: voteCommitFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): voteCommitPage!
  voteReveal(id: String!): voteReveal
  voteReveals(where: voteRevealFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): voteRevealPage!
  candidateResult(id: String!): candidateResult
  candidateResults(where: candidateResultFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): candidateResultPage!
  _meta: Meta
}

