# VoteChain Cron Jobs — Email Notifications + Auto-Reveal
# Dijalankan otomatis via GitHub Actions setiap 5 menit
#
# SETUP:
# 1. Push repo ini ke GitHub
# 2. Buka repo Settings → Secrets and variables → Actions
# 3. Tambahkan secret: NOTIFICATION_CRON_SECRET
#    Value: BObRDgehRdo72ZU40XfUss+IHvsbOPYnqcyKwMF+WDw=

name: VoteChain Cron

on:
  schedule:
    - cron: '*/5 * * * *' # Setiap 5 menit
  workflow_dispatch: # Manual trigger untuk testing

jobs:
  run-crons:
    name: Run Cron Jobs
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger Auto-Reveal
        run: |
          echo "=== Auto-Reveal ==="
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "x-cron-secret: ${{ secrets.NOTIFICATION_CRON_SECRET }}" \
            "https://e-votein.netlify.app/api/cron/auto-reveal")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Auto-reveal returned status $HTTP_CODE"
          fi

      - name: Trigger Notifications
        run: |
          echo "=== Notifications ==="
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "x-cron-secret: ${{ secrets.NOTIFICATION_CRON_SECRET }}" \
            "https://e-votein.netlify.app/api/cron/send-notifications")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Notifications returned status $HTTP_CODE"
          fi
