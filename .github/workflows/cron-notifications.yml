# VoteChain Cron Jobs — Email + In-App Notifications + Auto-Reveal
# Configure NOTIFICATION_CRON_SECRET in GitHub Actions and Vercel with the same value.

name: VoteChain Cron

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

concurrency:
  group: votechain-cron
  cancel-in-progress: false

jobs:
  run-crons:
    name: Run Cron Jobs
    runs-on: ubuntu-latest
    timeout-minutes: 7
    env:
      VOTEIN_BASE_URL: https://votein-evoting.vercel.app
    steps:
      - name: Trigger Auto-Reveal
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "x-cron-secret: ${{ secrets.NOTIFICATION_CRON_SECRET }}" \
            "$VOTEIN_BASE_URL/api/cron/auto-reveal"

      - name: Trigger Notifications
        if: always()
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "x-cron-secret: ${{ secrets.NOTIFICATION_CRON_SECRET }}" \
            "$VOTEIN_BASE_URL/api/cron/send-notifications"
